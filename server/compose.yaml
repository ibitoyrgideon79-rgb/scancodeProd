services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: scancodes-server:local
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-docker}
      SPRING_DOCKER_COMPOSE_ENABLED: "false"
      SPRING_DATASOURCE_URL: ${SPRING_DATASOURCE_URL:-jdbc:postgresql://postgres:5432/scancodes}
      SPRING_DATASOURCE_USERNAME: ${SPRING_DATASOURCE_USERNAME:-scancodes}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD:-scancodes_dev_password}
      APP_AUTH_PUBLIC_BASE_URL: ${APP_AUTH_PUBLIC_BASE_URL:-http://localhost:8080}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME:-}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY:-}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET:-}
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-scancodes}
      POSTGRES_USER: ${POSTGRES_USER:-scancodes}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-scancodes_dev_password}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scancodes -d scancodes"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
